name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Lets you re-deploy from the Actions tab without pushing a commit.
  workflow_dispatch:

# Read the repo, write a Pages deployment, and mint the OIDC token Pages requires.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time. `cancel-in-progress: false` so a running deploy is allowed to
# FINISH rather than being killed halfway — a half-published site is worse than a stale one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # 24, not 20: `node:sqlite` (used by the dormant server layer's tests) does not
          # exist before 22, and the test script runs across the whole of src/.
          node-version: 24
          cache: npm

      - run: npm ci

      # The site is a shop. It ships only if the money code still passes.
      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src

      - name: Test
        run: npm test

      - name: Build static export
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          # `output: "export"` writes here. Includes public/.nojekyll, WITHOUT which GitHub
          # runs Jekyll, Jekyll ignores every folder starting with `_`, Next's entire
          # `/_next/` directory is dropped, and the site ships with no CSS and no JS.
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
